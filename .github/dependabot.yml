version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # eslint-config-treesitter pins eslint-plugin-jsdoc@^50.x, which
      # only supports eslint 7-9, and imports `globals` without
      # declaring it as a dep (relying on eslint 9's transitives).
      # eslint 10 breaks both. Hold at major 9 until the config is
      # updated upstream.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    labels:
      - dependencies
      - rust
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    labels:
      - dependencies
      - go

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: wednesday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    labels:
      - dependencies
      - python
    groups:
      pip-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
      day: wednesday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    labels:
      - dependencies
      - swift
