name: Release

# Triggered by pushing a SemVer tag (e.g. `v0.1.0`). Publishes the
# crate to crates.io, the npm package (with native prebuilds bundled
# for Linux / macOS / Windows), and the Python sdist + abi3 wheels to
# PyPI, then creates a GitHub release whose body is the matching
# section of CHANGELOG.md.
#
# Third-party actions (anything outside `actions/*` and `github/*`)
# are pinned to a commit SHA with a trailing `# vN` comment, matching
# ci.yml. Dependabot still bumps these because the version comment is
# in the format it recognizes.

on:
  push:
    tags: ["v*"]
  # Manual re-trigger for the same tag — needed when a publish job
  # fails partway and one of the registries already accepted the
  # upload. Run with: `gh workflow run release.yml --ref vX.Y.Z`.
  # The `validate` job derives the version from `GITHUB_REF` via
  # `tag="${GITHUB_REF#refs/tags/}"`; under push this is always a
  # tag, under dispatch it's whatever `--ref` was passed. Only
  # dispatch from a tag ref — `validate` rejects branch refs with
  # a "does not look like vX.Y.Z" error.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Derive version from tag and verify it matches metadata
        id: version
        shell: bash
        run: |-
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$tag' does not look like vX.Y.Z" >&2
            exit 1
          fi
          # Parse TOML via python -c (stdlib tomllib, 3.11+) instead of
          # grep/sed — the latter silently picks `[[test]].name` over
          # `[package].name` if the manifest is ever reordered.
          ts_version=$(jq -r '.metadata.version' tree-sitter.json)
          pkg_version=$(jq -r '.version' package.json)
          py_version=$(python3 -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          crate_version=$(python3 -c 'import tomllib;print(tomllib.load(open("Cargo.toml","rb"))["package"]["version"])')
          for v in "$ts_version" "$pkg_version" "$py_version" "$crate_version"; do
            if [ "$v" != "$version" ]; then
              echo "Version mismatch: tag=$version tree-sitter.json=$ts_version package.json=$pkg_version pyproject.toml=$py_version Cargo.toml=$crate_version" >&2
              exit 1
            fi
          done
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
      - name: Verify distribution names match expected
        shell: bash
        run: |-
          # Each registry needs a different name because the unscoped
          # `tree-sitter-groovy` is held by amaanq on every flat
          # registry. A partial rename would publish under the wrong
          # name on one registry and either fail (collision) or
          # squat on a new name. Fail-fast here.
          expected_npm="@dekobon/tree-sitter-groovy"
          expected_crate="dekobon-tree-sitter-groovy"
          expected_pypi="dekobon-tree-sitter-groovy"
          actual_npm=$(jq -r '.name' package.json)
          actual_lock=$(jq -r '.name' package-lock.json)
          actual_crate=$(python3 -c 'import tomllib;print(tomllib.load(open("Cargo.toml","rb"))["package"]["name"])')
          actual_pypi=$(python3 -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["name"])')
          fail=0
          [ "$actual_npm"   = "$expected_npm"   ] || { echo "package.json name is $actual_npm, expected $expected_npm" >&2; fail=1; }
          [ "$actual_lock"  = "$expected_npm"   ] || { echo "package-lock.json name is $actual_lock, expected $expected_npm (regenerate with: npm install --package-lock-only)" >&2; fail=1; }
          [ "$actual_crate" = "$expected_crate" ] || { echo "Cargo.toml name is $actual_crate, expected $expected_crate" >&2; fail=1; }
          [ "$actual_pypi"  = "$expected_pypi"  ] || { echo "pyproject.toml name is $actual_pypi, expected $expected_pypi" >&2; fail=1; }
          [ $fail -eq 0 ] || exit 1
      - name: Verify CHANGELOG has a section for this version
        shell: bash
        run: |-
          if ! grep -qE "^## \[${{ steps.version.outputs.version }}\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section for ${{ steps.version.outputs.version }}" >&2
            exit 1
          fi

  test:
    name: Tests (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v6
      - name: Resolve tree-sitter-cli version from package-lock.json
        id: ts-cli
        shell: bash
        run: |-
          version=$(jq -r '.packages["node_modules/tree-sitter-cli"].version' package-lock.json)
          printf 'ref=v%s\n' "$version" >> "$GITHUB_OUTPUT"
      - uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
        with:
          tree-sitter-ref: ${{ steps.ts-cli.outputs.ref }}
      - uses: tree-sitter/parser-test-action@aba4a3de737f86f8ce83be38166a1ab521d4c960 # v2
        with:
          generate: true
          test-parser: true
          test-rust: true
          rust-version: "1.85"

  # Authentication is via crates.io Trusted Publishing (OIDC): the
  # `auth` step exchanges the runner's GitHub-minted ID token for a
  # short-lived registry token scoped to this run, which the publish
  # step passes to `cargo publish` via `CARGO_REGISTRY_TOKEN`. The
  # token auto-revokes when the job ends. A missing or misconfigured
  # trusted publisher on crates.io (wrong owner/repo/workflow/
  # environment claims) fails the `auth` step fast and loud; there is
  # no static secret to be absent.
  #
  # The publish step short-circuits if the version is already on
  # crates.io, keeping `workflow_dispatch` re-runs on the same tag
  # idempotent.
  crates-publish:
    name: Publish to crates.io
    needs: [validate, test]
    runs-on: ubuntu-latest
    # Binds the OIDC `environment` claim so the crates.io trusted
    # publisher only accepts JWTs minted while this job runs in the
    # `release` environment. Must exist on the repo before merge.
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.85"
      - name: Authenticate to crates.io via Trusted Publishing
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
      - name: Publish dekobon-tree-sitter-groovy
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |-
          set -eu
          # Query the sparse index (CDN-backed, no UA policing) rather
          # than the HTML API. Each line is one published version.
          # Sharding: 4+ char names live under <first-2>/<chars-3-4>/.
          INDEX="https://index.crates.io/de/ko/dekobon-tree-sitter-groovy"
          if curl -sfL "$INDEX" 2>/dev/null | grep -q "\"vers\":\"${VERSION}\""; then
            echo "dekobon-tree-sitter-groovy ${VERSION} already on crates.io — skipping"
          else
            cargo publish --locked
          fi

  npm-prebuilds:
    name: Build npm prebuilds (${{ matrix.os }})
    needs: [validate, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run prebuildify
      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds/
          if-no-files-found: error

  # Authentication is via npm Trusted Publishing (OIDC). npm CLI
  # >= 11.5.1 auto-detects the GitHub OIDC environment, exchanges
  # the runner's ID token for a short-lived registry token, and
  # publishes with provenance — no NPM_TOKEN required. A missing or
  # misconfigured trusted publisher on npmjs.com (wrong owner / repo
  # / workflow / environment claims) fails `npm publish` with an
  # explicit OIDC error. Node 24 ships with npm 11.x natively, so
  # no self-upgrade dance is needed; the `npm verify` step asserts
  # the CLI floor in case a future runner image regresses.
  npm-publish:
    name: Publish to npm
    needs: [validate, npm-prebuilds]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Verify npm supports Trusted Publishing
        shell: bash
        run: |-
          set -eu
          ver=$(npm --version)
          echo "npm version: $ver"
          # Floor: 11.5.1, the first npm release with Trusted
          # Publishing support. Encode the version as
          # major*1_000_000 + minor*1_000 + patch (no leading zeros,
          # so bash's `[ -lt ]` doesn't reinterpret octal). Strips
          # any pre-release suffix first since the runner image
          # ships stable releases.
          IFS=. read -r maj min pat <<<"${ver%%-*}"
          encoded=$(( maj * 1000000 + min * 1000 + pat ))
          if [ "$encoded" -lt 11005001 ]; then
            echo "npm $ver is below the 11.5.1 minimum required for Trusted Publishing" >&2
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: prebuilds/
          pattern: prebuilds-*
          merge-multiple: true
      - run: ls -R prebuilds/
      - name: npm publish
        run: npm publish --provenance --access public

  pypi-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: [validate, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v6
      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.0.0
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  pypi-sdist:
    name: Build sdist
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  pypi-publish:
    name: Publish to PyPI
    needs: [pypi-wheels, pypi-sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: "wheels-*"
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - run: ls -R dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        # `skip-existing: true` makes the upload idempotent — a
        # re-run after a partial publish no-ops on the files PyPI
        # already has, matching the `crates-publish` job's
        # sparse-index check. Without this, every retry that gets
        # past `validate` would fail PyPI with "File already exists"
        # and cascade to skipping `github-release`.
        with:
          skip-existing: true

  github-release:
    name: Create GitHub release
    needs: [validate, crates-publish, npm-publish, pypi-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Extract changelog section
        shell: bash
        run: |-
          version="${{ needs.validate.outputs.version }}"
          awk -v ver="$version" '
            $0 ~ "^## \\["ver"\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "Empty release notes for $version" >&2
            exit 1
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --notes-file release-notes.md \
            --verify-tag
