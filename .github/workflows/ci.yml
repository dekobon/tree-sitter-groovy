name: CI

# Third-party actions (anything outside `actions/*` and `github/*`)
# are pinned to a commit SHA with a trailing `# vN` comment.
# Floating tags or branches would let an upstream owner change
# behavior silently. Dependabot still bumps these because the
# version comment is in the format it recognizes.

on:
  push:
    branches: [main]
    paths: &paths
      - .github/workflows/**
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - queries/**
      - binding.gyp
      - package.json
      - package-lock.json
      - eslint.config.mjs
      - Cargo.toml
      - Cargo.lock
      - go.mod
      - go.sum
      - pyproject.toml
      - setup.py
      - Package.swift
      - tree-sitter.json
      - .taplo.toml
      - .typos.toml
      - deny.toml
      - .markdownlint-cli2.jsonc
      - "**/*.md"
  pull_request:
    paths: *paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint source code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint

  test:
    name: Run tests
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v6
      - name: Resolve tree-sitter-cli version from package-lock.json
        id: ts-cli
        shell: bash
        run: |-
          version=$(jq -r '.packages["node_modules/tree-sitter-cli"].version' package-lock.json)
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "tree-sitter-cli not found in package-lock.json" >&2
            exit 1
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "tree-sitter-cli version '$version' is not a valid SemVer string" >&2
            exit 1
          fi
          printf 'ref=v%s\n' "$version" >> "$GITHUB_OUTPUT"
      - uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
        with:
          tree-sitter-ref: ${{ steps.ts-cli.outputs.ref }}
      - uses: tree-sitter/parser-test-action@aba4a3de737f86f8ce83be38166a1ab521d4c960 # v2
        with:
          generate: true
          test-parser: true
          test-rust: true
          rust-version: "1.85"
          # test-node: true

  rust-lint:
    name: Rust lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.85"
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets -- -D warnings

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2
        with:
          command: check
          arguments: --all-features

  tooling:
    name: Repo tooling checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: typos
        uses: crate-ci/typos@7b04f660f4ee4f048d18fd341887cf28dfbedfe2 # v1.46.3
      - name: taplo (TOML format check)
        uses: uncenter/setup-taplo@09968a8ae38d66ddd3d23802c44bf6122d7aa991 # v1
        with:
          # Pinned: the action downloads taplo-full-* assets which
          # only exist up through 0.9.3. `latest` (and 0.10.0) ship
          # only taplo-* assets and the action fails with
          # "gzip: stdin: not in gzip format".
          version: "0.9.3"
      - run: taplo format --check
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: "**/*.md"

  fuzz:
    name: Fuzz parser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for scanner changes
        id: scanner-changes
        run: |-
          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
          elif git diff --quiet HEAD^ -- src/scanner.c; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'changed=true\n' >> "$GITHUB_OUTPUT"
          fi
      - uses: tree-sitter/fuzz-action@6a1dcff00aefd038ba418bd63732a9add4901266 # v4
        if: steps.scanner-changes.outputs.changed == 'true'
