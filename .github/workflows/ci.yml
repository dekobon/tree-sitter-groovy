name: CI

on:
  push:
    branches: [main]
    paths: &paths
      - .github/workflows/**
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - queries/**
      - binding.gyp
      - package.json
      - package-lock.json
      - eslint.config.mjs
      - Cargo.toml
      - Cargo.lock
      - go.mod
      - go.sum
      - pyproject.toml
      - setup.py
      - Package.swift
      - tree-sitter.json
      - .taplo.toml
      - .typos.toml
      - deny.toml
      - .markdownlint-cli2.jsonc
      - "**/*.md"
  pull_request:
    paths: *paths

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint source code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint

  test:
    name: Run tests
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tree-sitter-cli version from package-lock.json
        id: ts-cli
        shell: bash
        run: |-
          version=$(jq -r '.packages["node_modules/tree-sitter-cli"].version' package-lock.json)
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "tree-sitter-cli not found in package-lock.json" >&2
            exit 1
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "tree-sitter-cli version '$version' is not a valid SemVer string" >&2
            exit 1
          fi
          printf 'ref=v%s\n' "$version" >> "$GITHUB_OUTPUT"
      - uses: tree-sitter/setup-action/cli@v2
        with:
          tree-sitter-ref: ${{ steps.ts-cli.outputs.ref }}
      - uses: tree-sitter/parser-test-action@v2
        with:
          generate: true
          test-parser: true
          test-rust: true
          rust-version: "1.85"
          # test-node: true

  rust-lint:
    name: Rust lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.85"
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo clippy --all-targets -- -D warnings

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  tooling:
    name: Repo tooling checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: typos
        uses: crate-ci/typos@master
      - name: taplo (TOML format check)
        # SHA-pinned third-party action: the floating `@v1` branch
        # would let an upstream owner change behavior silently.
        uses: uncenter/setup-taplo@09968a8ae38d66ddd3d23802c44bf6122d7aa991 # v1
        with:
          # Pinned: the action downloads taplo-full-* assets which
          # only exist up through 0.9.3. `latest` (and 0.10.0) ship
          # only taplo-* assets and the action fails with
          # "gzip: stdin: not in gzip format".
          version: "0.9.3"
      - run: taplo format --check
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  fuzz:
    name: Fuzz parser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for scanner changes
        id: scanner-changes
        run: |-
          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
          elif git diff --quiet HEAD^ -- src/scanner.c; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'changed=true\n' >> "$GITHUB_OUTPUT"
          fi
      - uses: tree-sitter/fuzz-action@v4
        if: steps.scanner-changes.outputs.changed == 'true'
