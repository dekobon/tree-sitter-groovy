# See https://github.com/crate-ci/typos/blob/master/docs/reference.md to configure typos

[default.extend-identifiers]

[default.extend-words]
# "mis-" prefix: valid English hyphenation (mis-shapes, mis-lex, etc.)
mis = "mis"
# "juxt" = juxtaposition; used as a grammar term (juxt_function_call)
juxt = "juxt"

[files]
extend-exclude = [
  "src/parser.c",
  "src/grammar.json",
  "src/node-types.json",
  "src/tree_sitter/**",
  "test/corpus/**",
  "test/highlight/**",
  "test/stress/**",
]
